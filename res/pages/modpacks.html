<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Fonem Productions</title>
    <style>
        body {
            background-image: url('../assets/images/CrystalCaveRaidBG.png');
            background-position: center;
            background-color: #404040; /* Classic grey background */
            color: #ffffff; /* White text for high contrast */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }



        /* 3. The outer black border container */
        .border-pillar {
            background-color: rgba(0, 0, 0, 0.85);
            width: 100%;
            max-width: 900px; /* Controls how wide the pillar is */

            /* Forces it to take up the full screen height */
            min-height: 100vh;

            /* Adds a border effect on the left and right sides only */
            padding: 0 15px;
            box-sizing: border-box;

            /* Setup internal layout to stretch the inner gray box */
            display: flex;
            flex-direction: column;
        }

        /* 4. The inner gray content column */
        .content-column {
            background-color: rgba(49, 49, 49, 0.85);
            color: #ffffff;
            padding: 40px 20px; /* Space inside for text */

            /* Forces the gray box to stretch completely to the bottom */
            flex-grow: 1;
        }







        /* Top Left Corner Image Styling */
        .corner-logo {
            position: absolute;
            top: 20px;       /* Distance from the top edge */
            left: 20px;      /* Distance from the left edge */
            width: 85px;     /* Forces the image to a clean size */
            height: auto;    /* Keeps the original image proportions */
        }

        .container {
            text-align: center;
            max-width: 950px;
            padding: 20px;
        }
        h1 {
            font-size: 56px;
            margin: 0 0 20px 0;
        }
        hr {
            border: 0;
            height: 2px;
            background-color: #ffffff;
            margin-bottom: 20px;
            width: 100%;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            margin: 0;
        }


        .side-button-link {
            position: absolute;
            top: 40px;
            right: 40px;
            text-decoration: none;
        }


        .side-button {
            background-image: url('../assets/images/takaba.webp');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 16px;
            padding: 15px 30px;
            border: 2px solid #ffffff;
            border-radius: 8px;
            cursor: pointer;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            transition: transform 0.2s ease;
        }


        .side-button:hover {
            transform: scale(1.05);
        }

    </style>
</head>
<body>


<a href="../../index.html" class="corner-logo-link">
<img src="../assets/images/takaba.webp" alt="Logo" class="corner-logo">
</a>

<div class="border-pillar">
    <div class="content-column">
        <div class="container">
            <h1>Modpacks & Servers</h1>
            <hr>
            <p>Modpacks and servers of On Fonem Productions!</p>

            <a
                    href="https://onedrive.live.com/download?cid=73FA58877E992A0C&resid=73FA58877E992A0C%21sd75f756fe2d0439587285ee69d2b0aad"
                    target="_blank"
                    rel="noopener"
            >
                Download Test File
            </a>
        </div>
    </div>
</div>

</body>
</html>
