    <style>
        body {
            background-color: #404040; /* Classic grey background */
            color: #ffffff; /* White text for high contrast */

            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;

        /* Top Left Corner Image Styling */
        .corner-logo {
            position: absolute;
            top: 20px;       /* Distance from the top edge */

        .side-button-link {

            right: 40px;
            text-decoration: none;
        }


        .side-button {
            background-image: url('../assets/images/takaba.webp');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 16px;
            padding: 15px 30px;
            border: 2px solid #ffffff;
            border-radius: 8px;
            cursor: pointer;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            transition: transform 0.2s ease;
        }


        .side-button:hover {
            transform: scale(1.05);
        }
