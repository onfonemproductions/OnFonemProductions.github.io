<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Fonem Productions</title>
    <style>
        body {
            background-color: #404040; /* Classic grey background */
            color: #ffffff; /* White text for high contrast */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        /* Top Left Corner Image Styling */
        .corner-logo {
            position: absolute;
            top: 20px;       /* Distance from the top edge */
            left: 20px;      /* Distance from the left edge */
            width: 85px;     /* Forces the image to a clean size */
            height: auto;    /* Keeps the original image proportions */
        }

        .container {
            text-align: center;
            max-width: 950px;
            padding: 20px;
        }
        h1 {
            font-size: 56px;
            margin: 0 0 20px 0;
        }
        hr {
            border: 0;
            height: 2px;
            background-color: #ffffff;
            margin-bottom: 20px;
            width: 100%;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            margin: 0;
        }


        .side-button-link {
            position: absolute;
            top: 40px;
            right: 40px;
            text-decoration: none;
        }


        .side-button {
            background-image: url('res/assets/images/takaba.webp');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 16px;
            padding: 15px 30px;
            border: 2px solid #ffffff;
            border-radius: 8px;
            cursor: pointer;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            transition: transform 0.2s ease;
        }


        .side-button:hover {
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <a href="res/pages/modpacks.html" target="_blank" class="side-button-link">
        <button class="side-button">Mod Packs!!!</button>
    </a>

    <img src="res/assets/images/takaba.webp" alt="Logo" class="corner-logo">

    <div class="container">
        <h1>On Fonem Productions</h1>
        <hr>
        <p>The place to find On Fonems Cobblemon servers modpack development and changelog. Join the discord if you haven't, and feel free to leave feedback and suggestions on what you guys want more of or would like to intregate!</p>
    </div>

</body>
</html>
